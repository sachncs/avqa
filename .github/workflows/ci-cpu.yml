name: ci-cpu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format check
        run: ruff format --check .

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install torch
        run: pip install "torch>=2.1" --index-url https://download.pytorch.org/whl/cpu
      - name: Install avqa (editable)
        run: pip install -e . --no-deps
      - name: Install mypy
        run: pip install "mypy>=1.10"
      - name: Run mypy
        run: mypy src/avqa

  test-cpu:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install torch (CPU)
        run: pip install "torch>=2.1" --index-url https://download.pytorch.org/whl/cpu
      - name: Install avqa (editable)
        run: pip install -e . --no-deps
      - name: Install dev dependencies
        run: |
          pip install "pytest>=7" "pytest-cov>=4" "pytest-benchmark>=4" \
            "hypothesis>=6" "ruff>=0.5" "mypy>=1.10" "matplotlib>=3.7"
      - name: Install optional deps for tests
        run: pip install "transformers>=4.40"
      - name: Run unit + reference tests with coverage
        run: |
          pytest tests/unit tests/reference \
            --cov=avqa --cov-report=xml --cov-report=term \
            --cov-fail-under=90 -q
      - name: Run integration tests (CPU subset)
        run: pytest tests/integration -q -m "not gpu"
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
