[mypy]
python_version = 3.10
mypy_path = src
namespace_packages = True
explicit_package_bases = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
cache_dir = .mypy_cache
show_error_codes = True
pretty = True
color_output = True
error_summary = True
plugins = pydantic.mypy

# Strict mode for production source code
[mypy-avqa]
strict = True
warn_unused_ignores = True
warn_return_any = True
no_implicit_optional = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Tests and examples are checked but with relaxed rules
[mypy-tests]
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
check_untyped_defs = False

[mypy-examples]
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
check_untyped_defs = False

# Third-party libs without stubs
[mypy-torch]
ignore_missing_imports = True

[mypy-transformers]
ignore_missing_imports = True

[mypy-vllm]
ignore_missing_imports = True

[mypy-flash_attn]
ignore_missing_imports = True

[mypy-xformers]
ignore_missing_imports = True

[mypy-triton]
ignore_missing_imports = True

[mypy-triton.*]
ignore_missing_imports = True

# Triton kernels are JIT-compiled and use a special intermediate
# representation. The kernel function signatures take untyped
# tensor pointers (e.g. ``keys_ptr``) and the ``@triton.jit`` decorator
# is not a typed callable. Mypy's strict mode produces noise here
# that cannot be addressed without a triton type stub.
[mypy-avqa.triton.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
warn_unused_ignores = False
disable_error_code = no-untyped-def, no-untyped-call, untyped-decorator
ignore_missing_imports = True

[mypy-hypothesis]
ignore_missing_imports = True

[mypy-graphviz]
ignore_missing_imports = True

[mypy-matplotlib]
ignore_missing_imports = True
