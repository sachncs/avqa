target-version = "py310"
line-length = 100
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "dist",
  "site",
  "docs/_build",
  "src/avqa/_version.py",
]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "UP",   # pyupgrade
  "N",    # pep8-naming
  "SIM",  # flake8-simplify
  "PIE",  # flake8-pie
  "PT",   # flake8-pytest-style
  "RET",  # flake8-return
  "RUF",  # Ruff-specific rules
  "TID",  # flake8-tidy-imports
  "TCH",  # flake8-type-checking
  "ARG",  # flake8-unused-arguments
  "PTH",  # flake8-use-pathlib
  "ERA",  # eradicate (commented-out code)
  "PL",   # pylint
]
ignore = [
  "E501",  # line-too-long (handled by black)
  "B008",  # function call in default argument (common in PyTorch)
  "PLR0913", # too-many-arguments (common in config APIs)
  "PLR2004", # magic value used in comparison (common in tests)
  "RET504", # unnecessary-assign
]

[lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG001",  # unused function args (fixtures)
  "ARG002",  # unused method args
  "PLR2004", # magic values in tests
  "PT011",   # pytest.raises too broad
  "S101",    # assert (pytest convention)
  "N806",    # canonical tensor notation (B/H/T/D/N/C) is uppercase
  "N803",    # canonical tensor notation argument names (B/H/T/D/N/C)
  "TC003",   # pytest tmp_path fixture is typed via pytest re-export
             # of pathlib._local.Path, not stdlib pathlib.Path.
]
"examples/**/*.py" = [
  "E402",  # imports not at top
  "T201",  # print (examples use print)
]
"src/avqa/**/*.py" = [
  "N806",    # Variable B/H/T/D/N/C in function should be lowercase
             # — canonical tensor notation (spec §6.3) uses uppercase.
  "N803",    # Argument name B/H/T/D/N/C should be lowercase
             # — canonical tensor notation (spec §6.3) uses uppercase.
  "ARG002",  # Unused method argument for documenting contract parameters
             # that are part of the public interface.
  "PLR0912", # Too many branches
  "TC001",   # Type-checking block import — acceptable for forward refs.
  "TC002",   # torch is a runtime dep, not just a type-hint dep.
  "UP037",   # Quoted type annotations kept on purpose for forward refs to
             # optional imports (transformers, vllm, xformers, flash_attn).
  "F821",    # Forward references to optional deps; acceptable in
             # integrations.py where the dep may not be installed.
]
"src/avqa/triton/**/*.py" = [
  "ARG001",
  "ARG002",
  "PLR0913",
  "PLR0917",
  "ERA001",
  "B008",
  "E501",
  "TC004",
  "TC006",
]
"benchmarks/**/*.py" = [
  "N806",  # canonical tensor notation B/H/T/D/N/C is uppercase in benchmarks
  "N803",  # canonical tensor arg names
  "PLR2004",  # numeric magic values
  "PLR0913",  # Triton-style arg lists
  "PLR0915",  # CLI scripts with one big main() function
  "ERA001",  # commented-out code annotations kept for documentation
  "B008",  # default-arg closure capture is intentional in benchmarks
  "B023",  # lambda captures are intentional in benchmarks
  "RUF100",  # noqa directive not needed when rule is suppressed
]
"tests/integration/**/*.py" = [
  "F401",     # imports under _skip_if_unavailable guards
  "T201",     # print() diagnostic is acceptable in test diagnostics
  "ARG001",   # unused fixture args
  "ARG002",   # unused method args
]

[lint.isort]
known-first-party = ["avqa"]
combine-as-imports = true
force-sort-within-sections = true
[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.pylint]
max-args = 12
max-branches = 15
max-returns = 8
max-statements = 60

