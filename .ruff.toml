target-version = "py310"
line-length = 100
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "dist",
  "site",
  "docs/_build",
  "src/avqa/_version.py",
]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "UP",   # pyupgrade
  "N",    # pep8-naming
  "SIM",  # flake8-simplify
  "PIE",  # flake8-pie
  "PT",   # flake8-pytest-style
  "RET",  # flake8-return
  "RUF",  # Ruff-specific rules
  "TID",  # flake8-tidy-imports
  "TCH",  # flake8-type-checking
  "ARG",  # flake8-unused-arguments
  "PTH",  # flake8-use-pathlib
  "ERA",  # eradicate (commented-out code)
  "PL",   # pylint
]
ignore = [
  "E501",  # line-too-long (handled by black)
  "B008",  # function call in default argument (common in PyTorch)
  "PLR0913", # too-many-arguments (common in config APIs)
  "PLR2004", # magic value used in comparison (common in tests)
  "RET504", # unnecessary-assign
]

[lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG001",  # unused function args (fixtures)
  "ARG002",  # unused method args
  "PLR2004", # magic values in tests
  "PT011",   # pytest.raises too broad
  "S101",    # assert (pytest convention)
]
"examples/**/*.py" = [
  "E402",  # imports not at top
  "T201",  # print (examples use print)
]

[lint.isort]
known-first-party = ["avqa"]
combine-as-imports = true
force-sort-within-sections = true

[lint.flake8-tidy-imports]
ban-relative-imports = "parents"

[lint.pylint]
max-args = 12
max-branches = 15
max-returns = 8
max-statements = 60

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
docstring-code-format = true
