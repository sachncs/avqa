[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts = -ra --strict-markers --strict-config --tb=short --showlocals --durations=10 --color=yes
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests as requiring CUDA (deselect with '-m "not gpu"')
    integration: marks tests as integration tests
    reference: marks tests as reference (naive) implementations
    performance: marks tests as performance benchmarks
filterwarnings =
    error
    ignore::DeprecationWarning:transformers.*
    ignore::DeprecationWarning:torch.*
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch.*
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
xfail_strict = true
